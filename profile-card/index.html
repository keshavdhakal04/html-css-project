<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Keshav Dhakal - Profile Card</title>
    <link rel="stylesheet" href="style.css" />
    <!-- Boxicons CSS -->
    <link href="https://unpkg.com/boxicons@2.1.2/css/boxicons.min.css" rel="stylesheet" />
</head>

<body>
    <div class="profile-card">

        <!-- Open to Work Badge -->
        <div class="open-to-work">🟢 Open to Work</div>

        <!-- Profile Image -->
        <div class="image">
            <img src="../assets/keshav-dhakal.jpg" alt="Keshav Dhakal" class="profile-img" />
        </div>

        <!-- Name & Title -->
        <div class="text-data">
            <span class="name">Keshav Dhakal</span>
            <span class="job">CS Grad · Developer</span>
            <span class="bio">"Building projects to grow as a developer"</span>
        </div>

        <!-- Social Links -->
        <div class="media-buttons">
            <a href="https://github.com/keshavdhakal04" target="_blank" style="background: #333" class="link">
                <i class="bx bxl-github"></i>
            </a>
            <a href="https://www.linkedin.com/in/keshav-dhakal-76930622a/" target="_blank" style="background: #0077b5"
                class="link">
                <i class="bx bxl-linkedin"></i>
            </a>
            <a href="mailto:keshavdhakal04@gmail.com" style="background: #ea4335" class="link">
                <i class="bx bx-envelope"></i>
            </a>
        </div>

        <!-- Skill Tags -->
        <div class="skills">
            <span class="skill-tag">HTML</span>
            <span class="skill-tag">CSS</span>
            <span class="skill-tag">Git</span>
        </div>

        <!-- Action Buttons -->
        <div class="buttons">
            <a href="https://github.com/keshavdhakal04" target="_blank">
                <button class="button primary">View Projects</button>
            </a>
            <a href="mailto:keshavdhakal04@gmail.com">
                <button class="button secondary">Contact Me</button>
            </a>
        </div>

        <!-- Stats -->
        <div class="analytics">
            <div class="data">
                <i class="bx bx-code-alt"></i>
                <span class="number">3+</span>
                <span class="label">Projects</span>
            </div>
            <div class="data">
                <i class="bx bxl-github"></i>
                <span class="number">50+</span>
                <span class="label">Commits</span>
            </div>
            <div class="data">
                <i class="bx bx-star"></i>
                <span class="number">0</span>
                <span class="label">Stars</span>
            </div>
        </div>

    </div>
</body>
</body>

</html>
