<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arc Ring Clock</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="scene">
  <div class="clock-wrap">
    <svg class="clock" viewBox="0 0 260 260">

      <g id="ticks"></g>

      <circle class="ring ring-bg" cx="130" cy="130" r="110"/>
      <circle class="ring ring-bg" cx="130" cy="130" r="90"/>
      <circle class="ring ring-bg" cx="130" cy="130" r="68"/>

      <circle id="rh" cx="130" cy="130" r="68"></circle>
      <circle id="rm" cx="130" cy="130" r="90"></circle>
      <circle id="rs" cx="130" cy="130" r="110"></circle>

    </svg>
  </div>

  <div class="time-display">
    <div id="digs">00:00:00</div>
    <div id="ampm">AM</div>
  </div>

</div>

<script src="clock.js"></script>

</body>
</html>
