<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Card Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <!-- HEADER -->
    <header class="site-header">
        <h1 class="logo">🧠 Memoji</h1>
        <p class="tagline">Flip. Match. Win!</p>
    </header>

    <!-- STATS BAR -->
    <div class="stats-bar">
        <div class="stat">
            <span class="stat-label">Moves</span>
            <span class="stat-value" id="moves-count">0</span>
        </div>
        <div class="stat">
            <span class="stat-label">Matches</span>
            <span class="stat-value" id="matches-count">0 / 8</span>
        </div>
        <div class="stat">
            <span class="stat-label">Time</span>
            <span class="stat-value" id="timer">0s</span>
        </div>
        <button class="btn-restart" id="restart-btn">↺ Restart</button>
    </div>

    <!-- GRID CUSTOMIZER -->
    <div class="grid-customizer">
        <span class="grid-label">Custom Grid</span>
        <div class="grid-inputs">
            <div class="input-group">
                <label for="cols-input">Cols</label>
                <input type="number" id="cols-input" value="4" min="2" max="8">
            </div>
            <span class="input-sep">×</span>
            <div class="input-group">
                <label for="rows-input">Rows</label>
                <input type="number" id="rows-input" value="4" min="2" max="8">
            </div>
            <button class="btn-apply" id="apply-grid-btn">Apply</button>
        </div>
        <p class="grid-message msg-ok" id="grid-message">✅ 4×4 grid — 8 pairs. Let's go!</p>
    </div>

    <!-- CARD GRID -->
    <main class="game-board" id="game-board">
        <!-- Cards injected by JS -->
    </main>

    <!-- WIN MODAL -->
    <div class="modal-overlay hidden" id="win-modal">
        <div class="modal-box">
            <div class="modal-emoji">🎉</div>
            <h2 class="modal-title">You Won!</h2>
            <p class="modal-stats" id="modal-stats">Completed in 0 moves · 0s</p>
            <button class="btn-play-again" id="play-again-btn">Play Again</button>
        </div>
    </div>

    <script src="app.js"></script>

</body>

</html>
